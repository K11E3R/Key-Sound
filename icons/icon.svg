<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Keyboard body -->
  <rect x="1" y="7" width="16" height="11" rx="2" stroke="white" stroke-width="1.4"/>

  <!-- Row 1: 4 keys -->
  <rect x="3"   y="9.5" width="3" height="2.5" rx="0.6" fill="white"/>
  <rect x="7"   y="9.5" width="3" height="2.5" rx="0.6" fill="white"/>
  <rect x="11"  y="9.5" width="3" height="2.5" rx="0.6" fill="white"/>

  <!-- Row 2: spacebar -->
  <rect x="3.5" y="13.5" width="11" height="2.5" rx="0.6" fill="white"/>

  <!-- Sound waves -->
  <path d="M 20 9.5 Q 22.5 12 20 14.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 21.5 7.5 Q 25 12 21.5 16.5" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.55"/>
</svg>
